<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 1080" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1080" fill="#f9f6f0" rx="12"/>

  <!-- TÍTULO -->
  <text x="450" y="38" font-size="17" font-weight="bold" fill="#7a2d00" text-anchor="middle">Diagrama da Jornada do Usuário – Raízes do Nordeste</text>

  <!-- Linha central guia -->
  <line x1="450" y1="65" x2="450" y2="1005" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== ETAPA 1 – ACESSO ===== -->
  <rect x="290" y="62" width="320" height="58" rx="12" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="450" y="86" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Etapa 1 – Acesso</text>
  <text x="450" y="107" font-size="12" fill="#085041" text-anchor="middle">Abre o app ou acessa o totem na loja</text>
  <!-- canais -->
  <rect x="100" y="68" width="110" height="26" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="155" y="82" font-size="11" fill="#085041" text-anchor="middle">📱 Aplicativo</text>
  <rect x="100" y="100" width="110" height="26" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="155" y="114" font-size="11" fill="#085041" text-anchor="middle">🖥 Totem</text>
  <line x1="210" y1="82" x2="290" y2="88" stroke="#0F6E56" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="210" y1="114" x2="290" y2="108" stroke="#0F6E56" stroke-width="1" marker-end="url(#ar)"/>
  <!-- seta -->
  <line x1="450" y1="120" x2="450" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 2 – AUTENTICAÇÃO ===== -->
  <rect x="290" y="152" width="320" height="58" rx="12" fill="#CECBF6" stroke="#534AB7" stroke-width="1.2"/>
  <text x="450" y="177" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Etapa 2 – Autenticação</text>
  <text x="450" y="198" font-size="12" fill="#3C3489" text-anchor="middle">Login ou cadastro com aceite LGPD</text>
  <!-- bifurcação -->
  <rect x="660" y="156" width="160" height="24" rx="7" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="740" y="169" font-size="11" fill="#444" text-anchor="middle">Novo → cadastro</text>
  <rect x="660" y="186" width="160" height="24" rx="7" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
  <text x="740" y="199" font-size="11" fill="#444" text-anchor="middle">Existente → login</text>
  <line x1="610" y1="170" x2="660" y2="170" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="610" y1="198" x2="660" y2="198" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- seta -->
  <line x1="450" y1="210" x2="450" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 3 – SELEÇÃO DE UNIDADE ===== -->
  <rect x="290" y="242" width="320" height="58" rx="12" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="450" y="267" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Etapa 3 – Seleção de unidade</text>
  <text x="450" y="288" font-size="12" fill="#085041" text-anchor="middle">Escolhe a unidade desejada</text>
  <!-- unidades -->
  <rect x="100" y="244" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="256" font-size="11" fill="#444" text-anchor="middle">Recife</text>
  <rect x="100" y="271" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="283" font-size="11" fill="#444" text-anchor="middle">Fortaleza</text>
  <rect x="100" y="298" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="310" font-size="11" fill="#444" text-anchor="middle">Natal</text>
  <line x1="200" y1="270" x2="290" y2="270" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- seta -->
  <line x1="450" y1="300" x2="450" y2="332" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 4 – CARDÁPIO ===== -->
  <rect x="290" y="332" width="320" height="58" rx="12" fill="#FAC775" stroke="#854F0B" stroke-width="1.2"/>
  <text x="450" y="357" font-size="14" font-weight="bold" fill="#412402" text-anchor="middle">Etapa 4 – Visualização do cardápio</text>
  <text x="450" y="378" font-size="12" fill="#633806" text-anchor="middle">Navega categorias e filtra produtos</text>
  <!-- categorias -->
  <rect x="660" y="334" width="130" height="22" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="725" y="346" font-size="11" fill="#633806" text-anchor="middle">☕ Café da Manhã</text>
  <rect x="660" y="361" width="130" height="22" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="725" y="373" font-size="11" fill="#633806" text-anchor="middle">🫓 Salgados</text>
  <rect x="660" y="388" width="130" height="22" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="725" y="400" font-size="11" fill="#633806" text-anchor="middle">🥤 Sucos / Junino</text>
  <line x1="610" y1="360" x2="660" y2="360" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- seta -->
  <line x1="450" y1="390" x2="450" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 5 – MONTAGEM DO PEDIDO ===== -->
  <rect x="290" y="422" width="320" height="58" rx="12" fill="#FAC775" stroke="#854F0B" stroke-width="1.2"/>
  <text x="450" y="447" font-size="14" font-weight="bold" fill="#412402" text-anchor="middle">Etapa 5 – Montagem do pedido</text>
  <text x="450" y="468" font-size="12" fill="#633806" text-anchor="middle">Adiciona itens ao carrinho</text>
  <!-- seta -->
  <line x1="450" y1="480" x2="450" y2="512" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 6 – PAGAMENTO ===== -->
  <rect x="290" y="512" width="320" height="58" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="1.2"/>
  <text x="450" y="537" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">Etapa 6 – Pagamento</text>
  <text x="450" y="558" font-size="12" fill="#712B13" text-anchor="middle">Seleciona método → envia à API externa</text>
  <!-- métodos -->
  <rect x="100" y="514" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="526" font-size="11" fill="#444" text-anchor="middle">Pix</text>
  <rect x="100" y="541" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="553" font-size="11" fill="#444" text-anchor="middle">Cartão</text>
  <rect x="100" y="568" width="100" height="22" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="150" y="580" font-size="11" fill="#444" text-anchor="middle">Dinheiro</text>
  <line x1="200" y1="540" x2="290" y2="540" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- seta -->
  <line x1="450" y1="570" x2="450" y2="602" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 7 – CONFIRMAÇÃO ===== -->
  <rect x="290" y="602" width="320" height="58" rx="12" fill="#F5C4B3" stroke="#993C1D" stroke-width="1.2"/>
  <text x="450" y="627" font-size="14" font-weight="bold" fill="#4A1B0C" text-anchor="middle">Etapa 7 – Confirmação</text>
  <text x="450" y="648" font-size="12" fill="#712B13" text-anchor="middle">Retorno: aprovado ou negado</text>
  <!-- resultados -->
  <rect x="660" y="606" width="100" height="26" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1"/>
  <text x="710" y="620" font-size="12" font-weight="bold" fill="#173404" text-anchor="middle">✓ Aprovado</text>
  <rect x="660" y="638" width="100" height="26" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="710" y="652" font-size="12" font-weight="bold" fill="#501313" text-anchor="middle">✕ Negado</text>
  <line x1="610" y1="620" x2="660" y2="620" stroke="#2e7d32" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="610" y1="652" x2="660" y2="652" stroke="#c0392b" stroke-width="1.2" marker-end="url(#ar)"/>
  <!-- retentativa -->
  <path d="M760 664 Q800 690 800 540 Q800 510 610 540" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="820" y="600" font-size="10" fill="#c0392b" text-anchor="middle">tenta</text>
  <text x="820" y="614" font-size="10" fill="#c0392b" text-anchor="middle">novamente</text>
  <!-- seta -->
  <line x1="450" y1="660" x2="450" y2="692" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 8 – ACOMPANHAMENTO ===== -->
  <rect x="290" y="692" width="320" height="58" rx="12" fill="#CECBF6" stroke="#534AB7" stroke-width="1.2"/>
  <text x="450" y="717" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Etapa 8 – Acompanhamento</text>
  <text x="450" y="738" font-size="12" fill="#3C3489" text-anchor="middle">Visualiza status do pedido em tempo real</text>
  <!-- steps -->
  <rect x="100" y="694" width="150" height="20" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="175" y="705" font-size="11" fill="#444" text-anchor="middle">✅ Confirmado</text>
  <rect x="100" y="719" width="150" height="20" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="175" y="730" font-size="11" fill="#444" text-anchor="middle">🍳 Em preparo</text>
  <rect x="100" y="744" width="150" height="20" rx="6" fill="#D3D1C7" stroke="#888" stroke-width="0.8"/>
  <text x="175" y="755" font-size="11" fill="#444" text-anchor="middle">🔔 Pronto</text>
  <line x1="250" y1="720" x2="290" y2="720" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- seta -->
  <line x1="450" y1="750" x2="450" y2="782" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 9 – RETIRADA ===== -->
  <rect x="290" y="782" width="320" height="58" rx="12" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="450" y="807" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Etapa 9 – Retirada</text>
  <text x="450" y="828" font-size="12" fill="#085041" text-anchor="middle">Retira o pedido no balcão</text>
  <!-- seta -->
  <line x1="450" y1="840" x2="450" y2="872" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ===== ETAPA 10 – FIDELIDADE ===== -->
  <rect x="290" y="872" width="320" height="58" rx="12" fill="#C0DD97" stroke="#3B6D11" stroke-width="1.2"/>
  <text x="450" y="897" font-size="14" font-weight="bold" fill="#173404" text-anchor="middle">Etapa 10 – Fidelidade</text>
  <text x="450" y="918" font-size="12" fill="#27500A" text-anchor="middle">Pontos creditados automaticamente</text>
  <!-- info direita -->
  <rect x="660" y="876" width="150" height="22" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="735" y="888" font-size="11" fill="#27500A" text-anchor="middle">R$ 1,00 = 1 ponto</text>
  <rect x="660" y="904" width="150" height="22" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="735" y="916" font-size="11" fill="#27500A" text-anchor="middle">Resgata recompensas</text>
  <line x1="610" y1="888" x2="660" y2="888" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ===== LEGENDA ===== -->
  <rect x="40" y="962" width="820" height="60" rx="10" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="980" font-size="12" fill="#555">Legenda:</text>
  <rect x="120" y="968" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="140" y="980" font-size="11" fill="#333">Acesso / Seleção / Retirada</text>
  <rect x="300" y="968" width="14" height="14" rx="3" fill="#CECBF6" stroke="#534AB7"/>
  <text x="320" y="980" font-size="11" fill="#333">Autenticação / Status</text>
  <rect x="460" y="968" width="14" height="14" rx="3" fill="#FAC775" stroke="#854F0B"/>
  <text x="480" y="980" font-size="11" fill="#333">Cardápio / Pedido</text>
  <rect x="120" y="990" width="14" height="14" rx="3" fill="#F5C4B3" stroke="#993C1D"/>
  <text x="140" y="1002" font-size="11" fill="#333">Pagamento / Confirmação</text>
  <rect x="300" y="990" width="14" height="14" rx="3" fill="#C0DD97" stroke="#3B6D11"/>
  <text x="320" y="1002" font-size="11" fill="#333">Fidelidade / Sucesso</text>
  <rect x="460" y="990" width="14" height="14" rx="3" fill="#F7C1C1" stroke="#A32D2D"/>
  <text x="480" y="1002" font-size="11" fill="#333">Negado → retentativa</text>
  <line x1="610" y1="996" x2="650" y2="996" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="660" y="1002" font-size="11" fill="#333">Fluxo alternativo</text>

  <!-- MARCADOR DE SETA -->
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
