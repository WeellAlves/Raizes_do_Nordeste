<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1100" height="780" fill="#f9f6f0" rx="10"/>
  <text x="550" y="36" font-size="20" font-weight="bold" fill="#7a2d00" text-anchor="middle">Diagrama de Casos de Uso – Raízes do Nordeste</text>

  <!-- ====== ATORES (esquerda) ====== -->

  <!-- Cliente -->
  <circle cx="70" cy="145" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="163" x2="70" y2="210" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="175" x2="45" y2="195" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="175" x2="95" y2="195" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="210" x2="48" y2="235" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="210" x2="92" y2="235" stroke="#333" stroke-width="2"/>
  <text x="70" y="252" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Cliente</text>

  <!-- Atendente -->
  <circle cx="70" cy="400" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="418" x2="70" y2="465" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="430" x2="45" y2="450" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="430" x2="95" y2="450" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="465" x2="48" y2="490" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="465" x2="92" y2="490" stroke="#333" stroke-width="2"/>
  <text x="70" y="507" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Atendente</text>

  <!-- Cozinha -->
  <circle cx="70" cy="580" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="598" x2="70" y2="645" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="610" x2="45" y2="630" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="610" x2="95" y2="630" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="645" x2="48" y2="670" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="645" x2="92" y2="670" stroke="#333" stroke-width="2"/>
  <text x="70" y="687" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Cozinha</text>

  <!-- ====== ATORES (direita) ====== -->

  <!-- Gerente -->
  <circle cx="1030" cy="200" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="218" x2="1030" y2="265" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="230" x2="1005" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="230" x2="1055" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="265" x2="1008" y2="290" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="265" x2="1052" y2="290" stroke="#333" stroke-width="2"/>
  <text x="1030" y="307" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Gerente/</text>
  <text x="1030" y="322" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Admin</text>

  <!-- Sistema Pagamento -->
  <circle cx="1030" cy="530" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="548" x2="1030" y2="595" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="560" x2="1005" y2="580" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="560" x2="1055" y2="580" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="595" x2="1008" y2="620" stroke="#333" stroke-width="2"/>
  <line x1="1030" y1="595" x2="1052" y2="620" stroke="#333" stroke-width="2"/>
  <text x="1030" y="638" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Sistema</text>
  <text x="1030" y="653" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Pagamento</text>

  <!-- ====== FRONTEIRA DO SISTEMA ====== -->
  <rect x="155" y="60" width="740" height="690" fill="none" stroke="#b54b00" stroke-width="2.5" stroke-dasharray="10,5" rx="14"/>
  <text x="525" y="85" font-size="14" fill="#b54b00" text-anchor="middle" font-style="italic">Sistema Raízes do Nordeste</text>

  <!-- ====== CASOS DE USO ====== -->

  <!-- UC1: Cadastrar/Autenticar -->
  <ellipse cx="400" cy="120" rx="120" ry="30" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="116" font-size="12" text-anchor="middle" fill="#333">UC1: Cadastrar /</text>
  <text x="400" y="131" font-size="12" text-anchor="middle" fill="#333">Autenticar Usuário</text>

  <!-- UC2: Ver Cardápio -->
  <ellipse cx="400" cy="210" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="215" font-size="12" text-anchor="middle" fill="#333">UC2: Visualizar Cardápio</text>

  <!-- UC3: Realizar Pedido -->
  <ellipse cx="400" cy="300" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="305" font-size="12" text-anchor="middle" fill="#333">UC3: Realizar Pedido</text>

  <!-- UC4: Acompanhar Status -->
  <ellipse cx="400" cy="390" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="395" font-size="12" text-anchor="middle" fill="#333">UC4: Acompanhar Status</text>

  <!-- UC5: Realizar Pagamento -->
  <ellipse cx="400" cy="480" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="485" font-size="12" text-anchor="middle" fill="#333">UC5: Realizar Pagamento</text>

  <!-- UC6: Programa de Fidelidade -->
  <ellipse cx="400" cy="570" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="575" font-size="12" text-anchor="middle" fill="#333">UC6: Programa Fidelidade</text>

  <!-- UC7: Promoções / Campanhas -->
  <ellipse cx="400" cy="660" rx="120" ry="28" fill="#fff" stroke="#b54b00" stroke-width="2"/>
  <text x="400" y="665" font-size="12" text-anchor="middle" fill="#333">UC7: Promoções / Campanhas</text>

  <!-- UC8: Gerenciar Operações -->
  <ellipse cx="680" cy="200" rx="130" ry="28" fill="#fff" stroke="#5a7a00" stroke-width="2"/>
  <text x="680" y="205" font-size="12" text-anchor="middle" fill="#333">UC8: Gerenciar Operações</text>

  <!-- UC9: Relatórios / Auditoria -->
  <ellipse cx="680" cy="290" rx="130" ry="28" fill="#fff" stroke="#5a7a00" stroke-width="2"/>
  <text x="680" y="295" font-size="12" text-anchor="middle" fill="#333">UC9: Relatórios / Auditoria</text>

  <!-- UC10: Gerenciar Unidades -->
  <ellipse cx="680" cy="380" rx="130" ry="28" fill="#fff" stroke="#5a7a00" stroke-width="2"/>
  <text x="680" y="385" font-size="12" text-anchor="middle" fill="#333">UC10: Gerenciar Unidades</text>

  <!-- UC11: Atender Balcão -->
  <ellipse cx="630" cy="480" rx="110" ry="28" fill="#fff" stroke="#004a7a" stroke-width="2"/>
  <text x="630" y="485" font-size="12" text-anchor="middle" fill="#333">UC11: Atender Balcão</text>

  <!-- UC12: Preparar Pedido -->
  <ellipse cx="630" cy="580" rx="110" ry="28" fill="#fff" stroke="#7a4a00" stroke-width="2"/>
  <text x="630" y="585" font-size="12" text-anchor="middle" fill="#333">UC12: Preparar Pedido</text>

  <!-- UC13: Conf. Pagamento Externo -->
  <ellipse cx="630" cy="670" rx="130" ry="28" fill="#fff" stroke="#7a0066" stroke-width="2"/>
  <text x="630" y="666" font-size="12" text-anchor="middle" fill="#333">UC13: Confirmar Pagamento</text>
  <text x="630" y="681" font-size="12" text-anchor="middle" fill="#333">Externo</text>

  <!-- ====== LINHAS: CLIENTE → UCs ====== -->
  <line x1="100" y1="160" x2="280" y2="120" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="175" x2="280" y2="210" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="185" x2="280" y2="300" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="185" x2="280" y2="390" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="185" x2="280" y2="480" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="185" x2="280" y2="570" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="195" x2="280" y2="660" stroke="#555" stroke-width="1.4"/>

  <!-- ====== LINHAS: ATENDENTE → UCs ====== -->
  <line x1="100" y1="415" x2="520" y2="480" stroke="#555" stroke-width="1.4"/>
  <line x1="100" y1="420" x2="520" y2="390" stroke="#555" stroke-width="1.4"/>

  <!-- ====== LINHAS: COZINHA → UCs ====== -->
  <line x1="100" y1="590" x2="520" y2="580" stroke="#555" stroke-width="1.4"/>

  <!-- ====== LINHAS: GERENTE → UCs ====== -->
  <line x1="1000" y1="215" x2="810" y2="200" stroke="#555" stroke-width="1.4"/>
  <line x1="1000" y1="220" x2="810" y2="290" stroke="#555" stroke-width="1.4"/>
  <line x1="1000" y1="225" x2="810" y2="380" stroke="#555" stroke-width="1.4"/>

  <!-- ====== LINHAS: SISTEMA PAGAMENTO → UC13 ====== -->
  <line x1="1000" y1="545" x2="760" y2="670" stroke="#555" stroke-width="1.4"/>

  <!-- ====== LINHAS: UC3 → UC5 (inclui) ====== -->
  <line x1="400" y1="328" x2="400" y2="452" stroke="#888" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="412" y="398" font-size="10" fill="#888">«include»</text>

  <!-- ====== LINHAS: UC5 → UC13 ====== -->
  <line x1="520" y1="480" x2="500" y2="670" stroke="#888" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="465" y="590" font-size="10" fill="#888">«include»</text>

  <!-- LEGENDA -->
  <rect x="165" y="710" width="14" height="14" fill="none" stroke="#b54b00" stroke-width="2"/>
  <text x="185" y="722" font-size="11" fill="#333">UC Cliente / Fidelidade</text>
  <rect x="310" y="710" width="14" height="14" fill="none" stroke="#5a7a00" stroke-width="2"/>
  <text x="330" y="722" font-size="11" fill="#333">UC Gerente/Admin</text>
  <rect x="445" y="710" width="14" height="14" fill="none" stroke="#004a7a" stroke-width="2"/>
  <text x="465" y="722" font-size="11" fill="#333">UC Atendente</text>
  <rect x="555" y="710" width="14" height="14" fill="none" stroke="#7a4a00" stroke-width="2"/>
  <text x="575" y="722" font-size="11" fill="#333">UC Cozinha</text>
  <rect x="645" y="710" width="14" height="14" fill="none" stroke="#7a0066" stroke-width="2"/>
  <text x="665" y="722" font-size="11" fill="#333">UC Pagamento Ext.</text>

</svg>
